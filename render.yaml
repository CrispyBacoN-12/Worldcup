services:
  - type: web
    name: worldcup-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FOOTBALL_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      # MongoDB Atlas connection string — without this the server falls back to
      # JSON files, which do NOT persist on Render (data lost on restart/deploy).
      - key: MONGODB_URI
        sync: false
